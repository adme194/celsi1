<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBD yeee!</title>
    <style>
        /* Desain Latar Belakang */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #fce4ec 0%, #f8bbd0 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Desain Kartu */
        .card {
            background: white;
            padding: 40px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 85%;
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        /* Foto di Tengah */
        .profile-img {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            object-fit: cover;
            border: 6px solid #f06292;
            margin-bottom: 25px;
        }

        h1 {
            color: #ad1457;
            font-size: 1.8rem;
            margin-bottom: 10px;
        }

        p {
            color: #666;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        /* Tombol Interaksi */
        .btn {
            background-color: #f06292;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: bold;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(240, 98, 146, 0.4);
        }

        .btn:hover {
            background-color: #d81b60;
            transform: scale(1.05);
        }

        /* Pesan Tersembunyi */
        #secret-message {
            margin-top: 25px;
            font-size: 1.2rem;
            color: #ad1457;
            font-weight: bold;
            display: none;
            animation: fadeIn 1s;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="card">
        <img src="celsi.png" alt="Foto Adik" class="profile-img">
        
        <h1>Selamat Ulang Tahun! 🎂</h1>
        <p>Terima kasih sudah jadi adik yang luar biasa. Semoga tahun ini penuh dengan hal-hal keren!</p>
        
        <button class="btn" onclick="tampilkanKejutan()">Klik untuk Kejutan! ✨</button>
        
        <div id="secret-message">Ciyee yang makin gede! 🎉<br>Traktirannya jangan lupa ya! 🍦</div>
    </div>

    <script>
        function tampilkanKejutan() {
            // Menampilkan teks rahasia
            const msg = document.getElementById('secret-message');
            msg.style.display = 'block';
            
            // Memberikan notifikasi sederhana
            alert('Wih! Ada pesan rahasia buat kamu! 🎈');
        }
    </script>
</body>
</html>
